<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SC2 - Map Reveal and Scrolling Flags</title>
  <!-- Design System CSS -->
  <link rel="stylesheet" href="../../fonts.css">
  <!-- Animation System CSS -->
  <link rel="stylesheet" href="../../styles/animation-base.css">
  <link rel="stylesheet" href="../../styles/text-boxes.css">
  <style>
    /* Override to use proper centering from animation-base.css */
    body {
      background: #1A1A1A;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      overflow: hidden;
    }
    .screen-container {
      position: relative;
      width: 1280px;
      height: 800px;
      background: #808080;
      overflow: hidden;
    }
    #scene-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #808080;
    }
    .flags-container {
      position: absolute;
      top: 100px;
      left: 0;
      width: 100%;
      height: 80px;
      overflow: hidden;
      z-index: 8;
    }
    .flags-row {
      position: absolute;
      top: 0;
      left: 0;
      display: flex;
      gap: 40px;
      white-space: nowrap;
    }
    .flag {
      width: 80px;
      height: 60px;
      object-fit: contain;
      image-rendering: pixelated;
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <!-- Screen Container - Fixed 1280x800 -->
  <div class="screen-container">
    <!-- Scene Container -->
    <div id="scene-container" class="loading">
      جاري التحميل...
    </div>
  </div>
  <!-- Animation Engine Scripts -->
  <script src="../../engine/typewriter.js"></script>
  <script src="../../engine/sprite-animator.js"></script>
  <script src="../../engine/audio-player.js"></script>
  <script src="../../engine/engine.js"></script>
  <script>
    // Scene 2 configuration
    const SC2_CONFIG = {
      "duration": 15000,
      "backgroundColor": "#808080",
      "autoAdvance": false
    };
    // Flags list
    const flags = ['egypt.png', 'iraq.png', 'jordan.png', 'kuwait.png', 'lybia.png', 'palestine.png', 'saudi.png'];
    let flagsRow = null;
    let flagsInterval = null;
    let currentFlagX = 0;
    // Add callback to notify parent when scene ends
    SC2_CONFIG.onEnd = () => {
      console.log('SC2 ended');
      if (flagsInterval) clearInterval(flagsInterval);
      setTimeout(() => {
        window.parent.postMessage('sc2-complete', '*');
      }, 1000);
    };
    // Frame-by-frame map slide up from bottom to middle
    function slideMapUpFrameByFrame(mapElement) {
      const startY = 800; // Start below screen
      const endY = -50; // End in the middle of screen
      let currentY = startY;
      const stepSize = 80;
      const frameDelay = 220;
      mapElement.style.top = startY + 'px';
      const interval = setInterval(() => {
        currentY -= stepSize;
        if (currentY <= endY) {
          currentY = endY;
          mapElement.style.top = currentY + 'px';
          clearInterval(interval);
          return;
        }
        mapElement.style.top = currentY + 'px';
      }, frameDelay);
    }
    // Frame-by-frame continuous marquee scrolling flags (right to left)
    function scrollFlagsMarquee() {
      const stepSize = 20;
      const frameDelay = 220;
      const rowWidth = flagsRow.scrollWidth / 2; // Width of one set of flags
      flagsInterval = setInterval(() => {
        currentFlagX -= stepSize;
        // When first set is fully scrolled out, reset seamlessly
        if (Math.abs(currentFlagX) >= rowWidth) {
          currentFlagX = 0;
        }
        if (flagsRow) {
          flagsRow.style.left = currentFlagX + 'px';
        }
      }, frameDelay);
    }
    // Play scene
    window.addEventListener('load', () => {
      // Create and setup scene
      const container = document.getElementById('scene-container');
      container.innerHTML = '';
      container.classList.remove('loading');
      container.style.background = SC2_CONFIG.backgroundColor;
      // Time 0: Show front.png
      const front = document.createElement('img');
      front.src = 'front.png';
      front.className = 'sprite';
      front.style.width = '1100px';
      front.style.left = '50%';
      front.style.transform = 'translateX(-50%)';
      front.style.bottom = '0';
      front.style.zIndex = '10';
      container.appendChild(front);
      // Time 1500: Map slides up from bottom frame by frame
      setTimeout(() => {
        const map = document.createElement('img');
        map.src = 'map.png';
        map.className = 'sprite';
        map.style.width = '1200px';
        map.style.height = 'auto';
        map.style.left = '50%';
        map.style.transform = 'translateX(-50%)';
        map.style.zIndex = '5';
        container.appendChild(map);
        slideMapUpFrameByFrame(map);
      }, 1500);
      // Time 4000: Flags start continuous marquee scrolling (right to left)
      setTimeout(() => {
        const flagsContainer = document.createElement('div');
        flagsContainer.className = 'flags-container';
        flagsRow = document.createElement('div');
        flagsRow.className = 'flags-row';
        flagsRow.style.left = '0px';
        currentFlagX = 0;
        // Add flags 4 times for seamless continuous loop
        [...flags, ...flags, ...flags, ...flags].forEach(flag => {
          const flagImg = document.createElement('img');
          flagImg.src = flag;
          flagImg.className = 'flag';
          flagsRow.appendChild(flagImg);
        });
        flagsContainer.appendChild(flagsRow);
        container.appendChild(flagsContainer);
        scrollFlagsMarquee();
      }, 4000);
      // Schedule scene end
      setTimeout(() => {
        if (SC2_CONFIG.onEnd) {
          SC2_CONFIG.onEnd();
        }
      }, SC2_CONFIG.duration);
    });
  </script>
</body>
</html>
