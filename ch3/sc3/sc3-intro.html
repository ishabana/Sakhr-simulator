<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SC3 - Scene 3</title>
  <!-- Design System CSS -->
  <link rel="stylesheet" href="../../fonts.css">
  <!-- Animation System CSS -->
  <link rel="stylesheet" href="../../styles/animation-base.css">
  <link rel="stylesheet" href="../../styles/text-boxes.css">
  <style>
    /* Override to use proper centering from animation-base.css */
    body {
      background: #1A1A1A;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      overflow: hidden;
    }
    .screen-container {
      position: relative;
      width: 1280px;
      height: 800px;
      background: #000000;
      overflow: hidden;
    }
    #scene-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>
  <!-- Screen Container - Fixed 1280x800 -->
  <div class="screen-container">
    <!-- Scene Container -->
    <div id="scene-container" class="loading">
      جاري التحميل...
    </div>
  </div>
  <!-- Animation Engine Scripts -->
  <script src="../../engine/typewriter.js"></script>
  <script src="../../engine/sprite-animator.js"></script>
  <script src="../../engine/audio-player.js"></script>
  <script src="../../engine/engine.js"></script>
  <script>
    // Scene 3 configuration
    const SC3_CONFIG = {
      "duration": 10000,
      "background": "bg.png",
      "autoAdvance": false
    };
    // Add callback to notify parent when scene ends
    SC3_CONFIG.onEnd = () => {
      console.log('SC3 ended');
      setTimeout(() => {
        window.parent.postMessage('sc3-complete', '*');
      }, 1000);
    };
    // Play scene
    window.addEventListener('load', () => {
      if (window.audioPlayer) {
        try {
          window.audioPlayer.stopMusic();
          window.audioPlayer.playMusic('islamic.mp3', {
            volume: 0.7,
            loop: false
          });
          console.log('SC3: Intro sound started');
        } catch (e) {
          console.log('Sound file not found (optional):', e);
        }
      }
      // Create and setup scene
      const container = document.getElementById('scene-container');
      container.innerHTML = '';
      container.classList.remove('loading');
      // Create background
      const bg = document.createElement('img');
      bg.src = SC3_CONFIG.background;
      bg.className = 'scene-bg';
      bg.alt = 'Scene Background';
      container.appendChild(bg);
      // Schedule scene end
      setTimeout(() => {
        if (SC3_CONFIG.onEnd) {
          SC3_CONFIG.onEnd();
        }
      }, SC3_CONFIG.duration);
    });
  </script>
</body>
</html>
