<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SC3 - Zoom Out Animation</title>
  <!-- Design System CSS -->
  <link rel="stylesheet" href="../../fonts.css">
  <!-- Animation System CSS -->
  <link rel="stylesheet" href="../../styles/animation-base.css">
  <link rel="stylesheet" href="../../styles/text-boxes.css">
  <style>
    /* Override to use proper centering from animation-base.css */
    body {
      background: #1A1A1A;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      overflow: hidden;
    }
    .screen-container {
      position: relative;
      width: 1280px;
      height: 800px;
      background: #000000;
      overflow: hidden;
    }
    #scene-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>
  <!-- Screen Container - Fixed 1280x800 -->
  <div class="screen-container">
    <!-- Scene Container -->
    <div id="scene-container" class="loading">
      جاري التحميل...
    </div>
  </div>
  <!-- Animation Engine Scripts -->
  <script src="../../engine/typewriter.js"></script>
  <script src="../../engine/sprite-animator.js"></script>
  <script src="../../engine/audio-player.js"></script>
  <script src="../../engine/engine.js"></script>
  <script>
    // Scene 3 configuration
    const SC3_CONFIG = {
      "duration": 12000,
      "background": "bg.png",
      "autoAdvance": false
    };
    // Add callback to notify parent when scene ends
    SC3_CONFIG.onEnd = () => {
      console.log('SC3 ended');
      setTimeout(() => {
        window.parent.postMessage('sc3-complete', '*');
      }, 1000);
    };
    // Frame-by-frame zoom out (using width changes)
    function zoomOutFrameByFrame(element, startWidth, endWidth, steps, frameDelay, onComplete) {
      const widthStep = (startWidth - endWidth) / steps;
      let currentWidth = startWidth;
      let currentStep = 0;
      element.style.width = currentWidth + 'px';
      const interval = setInterval(() => {
        currentStep++;
        if (currentStep >= steps) {
          clearInterval(interval);
          element.style.opacity = '0';
          if (onComplete) onComplete();
          return;
        }
        currentWidth -= widthStep;
        element.style.width = currentWidth + 'px';
      }, frameDelay);
    }
    // Play scene
    window.addEventListener('load', () => {
      // Create and setup scene
      const container = document.getElementById('scene-container');
      container.innerHTML = '';
      container.classList.remove('loading');
      // Create background
      const bg = document.createElement('img');
      bg.src = SC3_CONFIG.background;
      bg.className = 'scene-bg';
      bg.alt = 'Scene Background';
      container.appendChild(bg);
      // Show front-2.png behind (hidden initially by front-1)
      const front2 = document.createElement('img');
      front2.id = 'front2';
      front2.src = 'front-2.png';
      front2.className = 'sprite';
      front2.style.width = '900px';
      front2.style.left = '50%';
      front2.style.top = '50%';
      front2.style.transform = 'translate(-50%, -50%)';
      front2.style.zIndex = '5';
      container.appendChild(front2);
      // Show front-1.png (very big, covers almost whole canvas)
      const front1 = document.createElement('img');
      front1.id = 'front1';
      front1.src = 'front-1.png';
      front1.className = 'sprite';
      front1.style.width = '1000px';
      front1.style.left = '50%';
      front1.style.top = '50%';
      front1.style.transform = 'translate(-50%, -50%)';
      front1.style.zIndex = '10';
      container.appendChild(front1);
      // Time 2000: front-1 starts zooming out frame by frame
      setTimeout(() => {
        zoomOutFrameByFrame(front1, 1000, 100, 10, 400, () => {
          front1.remove();
        });
      }, 2000);
      // Time 6000: front-2 turns into front-3
      setTimeout(() => {
        const f2 = document.getElementById('front2');
        if (f2) {
          f2.src = 'front-3.png';
        }
      }, 8000);
      // Time 7000: Arabic text appears
      setTimeout(() => {
        const text = document.createElement('div');
        text.className = 'text-overlay';
        text.style.top = '80px';
        text.style.left = '50%';
        text.style.transform = 'translateX(-50%)';
        text.style.fontSize = '48px';
        text.style.fontWeight = 'bold';
        text.style.color = '#FFFFFF';
        text.style.textShadow = '3px 3px 6px rgba(0,0,0,0.5)';
        text.style.zIndex = '20';
        container.appendChild(text);
        // Typewriter effect
        const fullText = 'عمل خارق!';
        let charIndex = 0;
        const typeInterval = setInterval(() => {
          if (charIndex >= fullText.length) {
            clearInterval(typeInterval);
            return;
          }
          text.textContent += fullText[charIndex];
          charIndex++;
        }, 100);
      }, 8005);
      // Schedule scene end
      setTimeout(() => {
        if (SC3_CONFIG.onEnd) {
          SC3_CONFIG.onEnd();
        }
      }, SC3_CONFIG.duration);
    });
  </script>
</body>
</html>
