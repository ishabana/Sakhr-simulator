<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SC6 - Team Scene</title>

  <!-- Design System CSS -->
  <link rel="stylesheet" href="../../../design-system/fonts.css">
  <link rel="stylesheet" href="../../../design-system/tokens.css">

  <!-- Animation System CSS -->
  <link rel="stylesheet" href="../../styles/animation-base.css">
  <link rel="stylesheet" href="../../styles/text-boxes.css">

  <style>
    /* Override to use proper centering from animation-base.css */
    body {
      background: #1A1A1A;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      overflow: hidden;
    }

    .screen-container {
      position: relative;
      width: 1280px;
      height: 800px;
      background: #000000;
      overflow: hidden;
    }

    #scene-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>
  <!-- Screen Container - Fixed 1280x800 -->
  <div class="screen-container">
    <!-- Scene Container -->
    <div id="scene-container" class="loading">
      جاري التحميل...
    </div>
  </div>

  <!-- Animation Engine Scripts -->
  <script src="../../engine/typewriter.js"></script>
  <script src="../../engine/sprite-animator.js"></script>
  <script src="../../engine/audio-player.js"></script>
  <script src="../../engine/engine.js"></script>

  <script>
    // Scene 6 configuration
    const SC6_CONFIG = {
      "duration": 15000,
      "background": "team.png",
      "autoAdvance": false,
      "timeline": [
        {
          "time": 8000,
          "action": "animateSprite",
          "config": {
            "id": "walkingChar",
            "frames": [
              "1.png",
              "2.png",
              "3.png",
              "4.png"
            ],
            "positions": [
              {"x": 0, "y": "bottom-75px"},
              {"x": 50, "y": "bottom-75px"},
              {"x": 100, "y": "bottom-75px"},
              {"x": 150, "y": "bottom-75px"}
            ],
            "frameDelay": 400,
            "width": "450px",
            "zIndex": 10
          }
        }
      ]
    };

    // Add callback to notify parent when scene ends
    SC6_CONFIG.onEnd = () => {
      console.log('SC6 ended');
      setTimeout(() => {
        window.parent.postMessage('sc6-complete', '*');
      }, 1000);
    };

    // Play intro sound
    window.addEventListener('load', () => {
      if (window.audioPlayer) {
        try {
          window.audioPlayer.stopMusic();
          window.audioPlayer.playMusic('../../audio/music/ch1-theme.mp3', {
            volume: 0.7,
            loop: false
          });
          console.log('SC6: Intro sound started');
        } catch (e) {
          console.log('Sound file not found (optional):', e);
        }
      }

      // Create and play scene
      const container = document.getElementById('scene-container');
      const scenePlayer = new ScenePlayer(SC6_CONFIG, container);
      scenePlayer.play();
    });
  </script>
</body>
</html>
