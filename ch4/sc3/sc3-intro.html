<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SC3 - Complex Sliding Scene</title>
  <!-- Design System CSS -->
  <link rel="stylesheet" href="../../fonts.css">
  <!-- Animation System CSS -->
  <link rel="stylesheet" href="../../styles/animation-base.css">
  <link rel="stylesheet" href="../../styles/text-boxes.css">
  <style>
    /* Override to use proper centering from animation-base.css */
    body {
      background: #1A1A1A;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      overflow: hidden;
    }
    .screen-container {
      position: relative;
      width: 1280px;
      height: 800px;
      background: #000000;
      overflow: hidden;
    }
    #scene-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #000000;
    }
  </style>
</head>
<body>
  <!-- Screen Container - Fixed 1280x800 -->
  <div class="screen-container">
    <!-- Scene Container -->
    <div id="scene-container" class="loading">
      جاري التحميل...
    </div>
  </div>
  <!-- Animation Engine Scripts -->
  <script src="../../engine/typewriter.js"></script>
  <script src="../../engine/sprite-animator.js"></script>
  <script src="../../engine/audio-player.js"></script>
  <script src="../../engine/engine.js"></script>
  <script>
    // Scene 3 configuration
    const SC3_CONFIG = {
      "duration": 13000,
      "backgroundColor": "#000000",
      "autoAdvance": false
    };
    // Add callback to notify parent when scene ends
    SC3_CONFIG.onEnd = () => {
      console.log('SC3 ended');
      setTimeout(() => {
        window.parent.postMessage('sc3-complete', '*');
      }, 1000);
    };
    // Animation helper - moves sprite frame by frame
    function animateFrameByFrame(element, xPositions, frameDelay, onComplete) {
      let index = 0;
      element.style.left = xPositions[0] + 'px';
      const interval = setInterval(() => {
        index++;
        if (index >= xPositions.length) {
          clearInterval(interval);
          if (onComplete) onComplete();
          return;
        }
        element.style.left = xPositions[index] + 'px';
      }, frameDelay);
      return interval;
    }
    // Play scene
    window.addEventListener('load', () => {
      // Create and setup scene
      const container = document.getElementById('scene-container');
      container.innerHTML = '';
      container.classList.remove('loading');
      container.style.background = '#000000';
      // Time 0: Show characters - EXACT sc2 positions (BOTH on LEFT side)
      const char1 = document.createElement('img');
      char1.src = 'b1.png';
      char1.id = 'char1';
      char1.className = 'sprite';
      char1.style.left = '-50px';
      char1.style.bottom = '100px';
      char1.style.width = '350px';
      char1.style.zIndex = '20';
      container.appendChild(char1);
      const char2 = document.createElement('img');
      char2.src = 'b2.png';
      char2.id = 'char2';
      char2.className = 'sprite';
      char2.style.left = '10px';
      char2.style.bottom = '100px';
      char2.style.width = '500px';
      char2.style.zIndex = '20';
      container.appendChild(char2);
      // Time 1000: 1.png slides left to right until it fills the background
      setTimeout(() => {
        const bg1 = document.createElement('img');
        bg1.src = '1.png';
        bg1.id = 'bg1';
        bg1.className = 'sprite';
        bg1.style.top = '0';
        bg1.style.width = '1280px';
        bg1.style.zIndex = '1';
        container.appendChild(bg1);
        animateFrameByFrame(bg1, [-1280, -1120, -960, -800, -640, -480, -320, -160, 0], 200);
      }, 1000);
      // Time 2600: t.png slides right to left until 3/4 appears
      setTimeout(() => {
        const tank = document.createElement('img');
        tank.src = 't.png';
        tank.id = 'tank';
        tank.className = 'sprite';
        tank.style.bottom = '100px';
        tank.style.width = '400px';
        tank.style.zIndex = '15';
        container.appendChild(tank);
        animateFrameByFrame(tank, [1280, 1092, 1030,], 400);
      }, 2600);
      // Time 3800: b2 becomes b2-2
      setTimeout(() => {
        const c2 = document.getElementById('char2');
        if (c2) c2.src = 'b2-2.png';
      }, 3800);
      // Time 4200: b1 becomes b1-2, b2-2 becomes b2-3, everything starts sliding
      setTimeout(() => {
        const c1 = document.getElementById('char1');
        const c2 = document.getElementById('char2');
        if (c1) c1.src = 'b1-2.png';
        if (c2) c2.src = 'b2-3.png';
        // 1.png and t.png slide left to right (continue offscreen)
        const bg1 = document.getElementById('bg1');
        const tank = document.getElementById('tank');
        if (bg1) {
          bg1.style.left = '0px';
          animateFrameByFrame(bg1, [0, 160, 320, 480, 640, 800, 960, 1120, 1280, 1440], 200);
        }
        if (tank) {
          tank.style.left = '1030px';
          animateFrameByFrame(tank, [2400, 1350, 1670, 1990, 2310, 2630], 300);
        }
        // 2.png starts sliding in (pushing effect)
        const bg2 = document.createElement('img');
        bg2.src = '2.png';
        bg2.id = 'bg2';
        bg2.className = 'sprite';
        bg2.style.top = '0';
        bg2.style.width = '1280px';
        bg2.style.zIndex = '2';
        container.appendChild(bg2);
        animateFrameByFrame(bg2, [-1280, -1120, -960, -800, -640, -480, -320, -160, 0, 160], 200);
        // Characters slide to right third
        if (c1) {
          c1.style.left = '250px';
          animateFrameByFrame(c1, [320, 450, 550, 660, 840, 920], 300);
        }
        if (c2) {
          c2.style.left = '100px';
          animateFrameByFrame(c2, [120, 250, 350, 460, 620, 700], 300);
        }
      }, 4200);
      // Time 6200: 2 continues, 3 starts
      setTimeout(() => {
        const bg2 = document.getElementById('bg2');
        if (bg2) {
          bg2.style.left = '160px';
          animateFrameByFrame(bg2, [160, 320, 480, 640, 800, 960, 1120, 1280, 1440, 1600], 200);
        }
        const bg3 = document.createElement('img');
        bg3.src = '3.png';
        bg3.id = 'bg3';
        bg3.className = 'sprite';
        bg3.style.top = '0';
        bg3.style.width = '1280px';
        bg3.style.zIndex = '3';
        container.appendChild(bg3);
        animateFrameByFrame(bg3, [-1280, -1120, -960, -800, -640, -480, -320, -160, 0, 160], 200);
      }, 6200);
      // Time 8200: 3 continues, 4 starts
      setTimeout(() => {
        const bg3 = document.getElementById('bg3');
        if (bg3) {
          bg3.style.left = '160px';
          animateFrameByFrame(bg3, [160, 320, 480, 640, 800, 960, 1120, 1280, 1440, 1600], 200);
        }
        const bg4 = document.createElement('img');
        bg4.src = '4.png';
        bg4.id = 'bg4';
        bg4.className = 'sprite';
        bg4.style.top = '0';
        bg4.style.width = '1280px';
        bg4.style.zIndex = '4';
        container.appendChild(bg4);
        animateFrameByFrame(bg4, [-1280, -1120, -960, -800, -640, -480, -320, -160, 0, 160], 200);
      }, 8200);
      // Time 10200: 4 continues, 6 starts and becomes final background
      setTimeout(() => {
        const bg4 = document.getElementById('bg4');
        if (bg4) {
          bg4.style.left = '160px';
          animateFrameByFrame(bg4, [160, 320, 480, 640, 800, 960, 1120, 1280, 1440, 1600], 200);
        }
        const bg6 = document.createElement('img');
        bg6.src = '6.png';
        bg6.id = 'bg6';
        bg6.className = 'sprite';
        bg6.style.top = '0';
        bg6.style.width = '1280px';
        bg6.style.zIndex = '5';
        container.appendChild(bg6);
        animateFrameByFrame(bg6, [-1280, -1120, -960, -800, -640, -480, -320, -160, 0], 200);
      }, 10200);
      // Schedule scene end
      setTimeout(() => {
        if (SC3_CONFIG.onEnd) {
          SC3_CONFIG.onEnd();
        }
      }, SC3_CONFIG.duration);
    });
  </script>
</body>
</html>
